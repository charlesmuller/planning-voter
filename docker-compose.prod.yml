services:
  planning-voter-web:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        NODE_ENV: production
    env_file:
      - ./client/.env.production
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=768
    volumes:
      - /etc/letsencrypt/live/planningvoter.kinghost.net:/etc/letsencrypt:ro
    depends_on:
      - server
    networks:
      - app-network
    ports:
      - "3000:80"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env.production
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=768
      - CLIENT_URL=https://planningvoter.kinghost.net
      - API_PORT=4000
      - HEALTH_CHECK_KEY=${HEALTH_CHECK_KEY}
      - LOG_LEVEL=info
      - LOG_RETENTION_DAYS=15
    volumes:
      - ./server/storage/logs:/usr/src/app/storage/logs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get({host:'localhost',port:4000,path:'/api/health',headers:{'X-Health-Check-Key':process.env.HEALTH_CHECK_KEY}},r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
